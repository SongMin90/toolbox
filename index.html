<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>万能工具箱</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        header p {
            font-size: 1.1em;
            opacity: 0.9;
        }
        
        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        
        .tool-card {
            background: white;
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .tool-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }
        
        .tool-card h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.3em;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .tool-card .icon {
            font-size: 1.5em;
        }
        
        .tool-content {
            margin-top: 15px;
        }
        
        input, select, textarea {
            width: 100%;
            padding: 10px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            margin-bottom: 10px;
            transition: border-color 0.3s ease;
        }
        
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        button {
            width: 100%;
            padding: 12px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .result {
            margin-top: 15px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 8px;
            word-break: break-all;
        }
        
        .result-label {
            font-weight: bold;
            color: #666;
            margin-bottom: 5px;
        }
        
        .result-value {
            color: #333;
            font-size: 1.1em;
        }
        
        .color-preview {
            width: 100%;
            height: 50px;
            border-radius: 8px;
            margin-bottom: 10px;
            border: 2px solid #e0e0e0;
        }
        
        .qr-code {
            text-align: center;
            padding: 20px;
            background: white;
        }
        
        .length-tools {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        .length-tools input {
            flex: 1;
            margin-bottom: 0;
        }
        
        .length-tools select {
            width: auto;
            margin-bottom: 0;
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🛠️ 万能工具箱</h1>
            <p>日常实用小工具，一站式解决</p>
        </header>
        
        <div class="tools-grid">
            <!-- 计算器 -->
            <div class="tool-card">
                <h2><span class="icon">🔢</span> 计算器</h2>
                <div class="tool-content">
                    <input type="text" id="calc-input" placeholder="输入算式，如：2 + 3 * 4">
                    <button onclick="calculate()">计算</button>
                    <div class="result hidden" id="calc-result">
                        <div class="result-label">结果：</div>
                        <div class="result-value" id="calc-value"></div>
                    </div>
                </div>
            </div>
            
            <!-- 单位转换 -->
            <div class="tool-card">
                <h2><span class="icon">📏</span> 单位转换</h2>
                <div class="tool-content">
                    <div class="length-tools">
                        <input type="number" id="length-value" placeholder="数值">
                        <select id="length-from">
                            <option value="m">米</option>
                            <option value="km">千米</option>
                            <option value="cm">厘米</option>
                            <option value="ft">英尺</option>
                            <option value="in">英寸</option>
                        </select>
                    </div>
                    <div style="text-align: center; margin: 10px 0;">➡️</div>
                    <div class="length-tools">
                        <input type="number" id="length-to" readonly placeholder="结果">
                        <select id="length-to-unit" onchange="convertLength()">
                            <option value="m">米</option>
                            <option value="km">千米</option>
                            <option value="cm">厘米</option>
                            <option value="ft">英尺</option>
                            <option value="in">英寸</option>
                        </select>
                    </div>
                    <button onclick="convertLength()" style="margin-top: 10px;">转换</button>
                </div>
            </div>
            
            <!-- 颜色选择器 -->
            <div class="tool-card">
                <h2><span class="icon">🎨</span> 颜色选择器</h2>
                <div class="tool-content">
                    <div class="color-preview" id="color-preview" style="background: #667eea;"></div>
                    <input type="color" id="color-picker" value="#667eea" onchange="updateColor()">
                    <div class="result">
                        <div class="result-label">HEX:</div>
                        <div class="result-value" id="color-hex">#667eea</div>
                        <div class="result-label" style="margin-top: 10px;">RGB:</div>
                        <div class="result-value" id="color-rgb">rgb(102, 126, 234)</div>
                    </div>
                </div>
            </div>
            
            <!-- 文字统计 -->
            <div class="tool-card">
                <h2><span class="icon">📝</span> 文字统计</h2>
                <div class="tool-content">
                    <textarea id="text-input" rows="4" placeholder="输入文字..." oninput="countText()"></textarea>
                    <div class="result">
                        <div class="result-label">字符数：<span id="char-count">0</span></div>
                        <div class="result-label">单词数：<span id="word-count">0</span></div>
                        <div class="result-label">行数：<span id="line-count">0</span></div>
                    </div>
                </div>
            </div>
            
            <!-- 密码生成器 -->
            <div class="tool-card">
                <h2><span class="icon">🔐</span> 密码生成器</h2>
                <div class="tool-content">
                    <label style="display: flex; align-items: center; gap: 10px; margin-bottom: 10px;">
                        <input type="checkbox" id="pwd-uppercase" checked style="width: auto; margin: 0;"> 大写字母
                    </label>
                    <label style="display: flex; align-items: center; gap: 10px; margin-bottom: 10px;">
                        <input type="checkbox" id="pwd-lowercase" checked style="width: auto; margin: 0;"> 小写字母
                    </label>
                    <label style="display: flex; align-items: center; gap: 10px; margin-bottom: 10px;">
                        <input type="checkbox" id="pwd-numbers" checked style="width: auto; margin: 0;"> 数字
                    </label>
                    <label style="display: flex; align-items: center; gap: 10px; margin-bottom: 10px;">
                        <input type="checkbox" id="pwd-symbols" style="width: auto; margin: 0;"> 特殊符号
                    </label>
                    <input type="number" id="pwd-length" value="12" min="4" max="32" placeholder="密码长度">
                    <button onclick="generatePassword()">生成密码</button>
                    <div class="result hidden" id="pwd-result">
                        <div class="result-label">生成的密码：</div>
                        <div class="result-value" id="pwd-value" style="font-family: monospace; font-size: 1.2em;"></div>
                    </div>
                </div>
            </div>
            
            <!-- 二维码生成 -->
            <div class="tool-card">
                <h2><span class="icon">📱</span> 二维码生成</h2>
                <div class="tool-content">
                    <input type="text" id="qr-text" placeholder="输入网址或文字">
                    <button onclick="generateQR()">生成二维码</button>
                    <div class="qr-code hidden" id="qr-result">
                        <img id="qr-image" src="" alt="二维码" style="max-width: 200px;">
                    </div>
                </div>
            </div>
            
            <!-- 日期计算 -->
            <div class="tool-card">
                <h2><span class="icon">📅</span> 日期计算</h2>
                <div class="tool-content">
                    <input type="date" id="date-input">
                    <button onclick="calculateDate()">计算天数差</button>
                    <div class="result hidden" id="date-result">
                        <div class="result-label">距离今天：</div>
                        <div class="result-value" id="date-value"></div>
                    </div>
                </div>
            </div>
            
            <!-- 进制转换 -->
            <div class="tool-card">
                <h2><span class="icon">💻</span> 进制转换</h2>
                <div class="tool-content">
                    <input type="text" id="bin-input" placeholder="输入数字">
                    <select id="bin-from">
                        <option value="10">十进制</option>
                        <option value="2">二进制</option>
                        <option value="8">八进制</option>
                        <option value="16">十六进制</option>
                    </select>
                    <button onclick="convertBase()" style="margin-top: 10px;">转换</button>
                    <div class="result hidden" id="bin-result">
                        <div class="result-label">二进制：<span id="bin-2"></span></div>
                        <div class="result-label">八进制：<span id="bin-8"></span></div>
                        <div class="result-label">十进制：<span id="bin-10"></span></div>
                        <div class="result-label">十六进制：<span id="bin-16"></span></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // 计算器
        function calculate() {
            const input = document.getElementById('calc-input').value;
            try {
                const result = eval(input.replace(/[^0-9+\-*/().]/g, ''));
                document.getElementById('calc-value').textContent = result;
                document.getElementById('calc-result').classList.remove('hidden');
            } catch (e) {
                document.getElementById('calc-value').textContent = '无效的算式';
                document.getElementById('calc-result').classList.remove('hidden');
            }
        }
        
        // 单位转换
        function convertLength() {
            const value = parseFloat(document.getElementById('length-value').value);
            const from = document.getElementById('length-from').value;
            const to = document.getElementById('length-to-unit').value;
            
            if (isNaN(value)) {
                document.getElementById('length-to').value = '';
                return;
            }
            
            const toMeter = {
                m: 1,
                km: 1000,
                cm: 0.01,
                ft: 0.3048,
                in: 0.0254
            };
            
            const meters = value * toMeter[from];
            const result = meters / toMeter[to];
            document.getElementById('length-to').value = result.toFixed(4);
        }
        
        // 颜色选择器
        function updateColor() {
            const color = document.getElementById('color-picker').value;
            document.getElementById('color-preview').style.background = color;
            document.getElementById('color-hex').textContent = color;
            
            const r = parseInt(color.slice(1, 3), 16);
            const g = parseInt(color.slice(3, 5), 16);
            const b = parseInt(color.slice(5, 7), 16);
            document.getElementById('color-rgb').textContent = `rgb(${r}, ${g}, ${b})`;
        }
        
        // 文字统计
        function countText() {
            const text = document.getElementById('text-input').value;
            document.getElementById('char-count').textContent = text.length;
            document.getElementById('word-count').textContent = text.trim() ? text.trim().split(/\s+/).length : 0;
            document.getElementById('line-count').textContent = text ? text.split('\n').length : 0;
        }
        
        // 密码生成器
        function generatePassword() {
            const uppercase = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            const lowercase = 'abcdefghijklmnopqrstuvwxyz';
            const numbers = '0123456789';
            const symbols = '!@#$%^&*()_+-=[]{}|;:,.<>?';
            
            let chars = '';
            if (document.getElementById('pwd-uppercase').checked) chars += uppercase;
            if (document.getElementById('pwd-lowercase').checked) chars += lowercase;
            if (document.getElementById('pwd-numbers').checked) chars += numbers;
            if (document.getElementById('pwd-symbols').checked) chars += symbols;
            
            if (!chars) {
                alert('请至少选择一种字符类型');
                return;
            }
            
            const length = parseInt(document.getElementById('pwd-length').value) || 12;
            let password = '';
            for (let i = 0; i < length; i++) {
                password += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            
            document.getElementById('pwd-value').textContent = password;
            document.getElementById('pwd-result').classList.remove('hidden');
        }
        
        // 二维码生成
        function generateQR() {
            const text = document.getElementById('qr-text').value;
            if (!text) {
                alert('请输入内容');
                return;
            }
            
            const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(text)}`;
            document.getElementById('qr-image').src = qrUrl;
            document.getElementById('qr-result').classList.remove('hidden');
        }
        
        // 日期计算
        function calculateDate() {
            const dateInput = document.getElementById('date-input').value;
            if (!dateInput) {
                alert('请选择日期');
                return;
            }
            
            const targetDate = new Date(dateInput);
            const today = new Date();
            const diffTime = targetDate - today;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            
            if (diffDays > 0) {
                document.getElementById('date-value').textContent = `${diffDays} 天后`;
            } else if (diffDays < 0) {
                document.getElementById('date-value').textContent = `${Math.abs(diffDays)} 天前`;
            } else {
                document.getElementById('date-value').textContent = '就是今天！';
            }
            document.getElementById('date-result').classList.remove('hidden');
        }
        
        // 进制转换
        function convertBase() {
            const input = document.getElementById('bin-input').value.trim();
            const fromBase = parseInt(document.getElementById('bin-from').value);
            
            if (!input) {
                alert('请输入数字');
                return;
            }
            
            try {
                const decimal = parseInt(input, fromBase);
                if (isNaN(decimal)) {
                    throw new Error('无效的数字');
                }
                
                document.getElementById('bin-2').textContent = decimal.toString(2);
                document.getElementById('bin-8').textContent = decimal.toString(8);
                document.getElementById('bin-10').textContent = decimal.toString(10);
                document.getElementById('bin-16').textContent = decimal.toString(16).toUpperCase();
                document.getElementById('bin-result').classList.remove('hidden');
            } catch (e) {
                alert('请输入有效的数字');
            }
        }
    </script>
</body>
</html>
